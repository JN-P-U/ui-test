<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>file-transfer | 대용량 로그 기반 파일 이행 매핑 툴</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
  <main class="mx-auto max-w-7xl px-5 py-6">
    <header class="mb-5 flex flex-col gap-3 border-b border-slate-300 pb-5 md:flex-row md:items-end md:justify-between">
      <div>
        <p class="text-sm font-semibold text-blue-700">file-transfer</p>
        <h1 class="text-2xl font-bold tracking-normal">대용량 로그 기반 파일 이행 매핑 툴</h1>
      </div>
      <div class="text-sm text-slate-600">10MB 청크 단위 스트리밍 처리 · Vanilla JS · 브라우저 단독 실행</div>
    </header>

    <section class="grid gap-5 lg:grid-cols-[minmax(0,1fr)_380px]">
      <div class="space-y-5">
        <section class="rounded-lg border border-slate-300 bg-white p-5">
          <div class="mb-4 flex items-center justify-between gap-3">
            <h2 class="text-lg font-bold">파일 업로드</h2>
            <span id="fileStatus" class="text-sm text-slate-500">파일 없음</span>
          </div>
          <label id="dropZone" for="fileInput" class="flex min-h-44 cursor-pointer flex-col items-center justify-center rounded-lg border-2 border-dashed border-slate-300 bg-slate-50 px-4 py-8 text-center transition hover:border-blue-400 hover:bg-blue-50">
            <input id="fileInput" type="file" class="sr-only">
            <span class="text-base font-bold text-slate-800">로그 파일을 드롭하거나 클릭해서 선택</span>
            <span class="mt-2 text-sm text-slate-500">1GB 이상 파일도 한 번에 올리지 않고 10MB씩 나누어 처리합니다.</span>
          </label>
          <dl id="fileMeta" class="mt-4 grid gap-3 text-sm sm:grid-cols-3">
            <div class="rounded-md bg-slate-50 p-3">
              <dt class="font-semibold text-slate-500">파일명</dt>
              <dd id="metaName" class="mt-1 truncate">-</dd>
            </div>
            <div class="rounded-md bg-slate-50 p-3">
              <dt class="font-semibold text-slate-500">크기</dt>
              <dd id="metaSize" class="mt-1">-</dd>
            </div>
            <div class="rounded-md bg-slate-50 p-3">
              <dt class="font-semibold text-slate-500">수정일</dt>
              <dd id="metaDate" class="mt-1">-</dd>
            </div>
          </dl>
        </section>

        <section class="rounded-lg border border-slate-300 bg-white p-5">
          <h2 class="mb-4 text-lg font-bold">NFS → Object Storage 매핑</h2>
          <div class="grid gap-4 md:grid-cols-2">
            <label class="block">
              <span class="mb-1 block text-sm font-bold text-slate-700">원본 경로 접두사(NFS)</span>
              <input id="nfsPrefix" type="text" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm outline-none focus:border-blue-500" placeholder="예: /nfs/old/">
            </label>
            <label class="block">
              <span class="mb-1 block text-sm font-bold text-slate-700">To-Be 경로 접두사(Object Storage)</span>
              <input id="objectPrefix" type="text" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm outline-none focus:border-blue-500" placeholder="예: my-bucket/new/">
            </label>
          </div>
          <div class="grid gap-4 md:grid-cols-[minmax(0,1fr)_160px]">
            <label class="mt-4 block">
              <span class="mb-1 block text-sm font-bold text-slate-700">추가 Regex 패턴</span>
              <input id="regexPattern" type="text" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm outline-none focus:border-blue-500" placeholder="예: userId=(\\d+)">
            </label>
            <div class="mt-4">
              <span class="mb-1 block text-sm font-bold text-slate-700">Regex 옵션</span>
              <div class="flex h-[38px] items-center gap-3 rounded-md border border-slate-300 px-3 text-sm">
                <label class="flex items-center gap-1"><input id="flagIgnoreCase" type="checkbox"> i</label>
                <label class="flex items-center gap-1"><input id="flagMultiline" type="checkbox"> m</label>
              </div>
            </div>
          </div>
          <label class="mt-4 block">
            <span class="mb-1 block text-sm font-bold text-slate-700">추가 치환식</span>
            <input id="replacement" type="text" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm outline-none focus:border-blue-500" placeholder="예: memberId=$1">
          </label>
          <div class="mt-4 grid gap-4 md:grid-cols-2">
            <label class="block">
              <span class="mb-1 block text-sm font-bold text-slate-700">포함할 행 Regex</span>
              <input id="includePattern" type="text" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm outline-none focus:border-blue-500" placeholder="비우면 전체 처리">
            </label>
            <label class="block">
              <span class="mb-1 block text-sm font-bold text-slate-700">제외할 행 Regex</span>
              <input id="excludePattern" type="text" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm outline-none focus:border-blue-500" placeholder="비우면 제외 없음">
            </label>
          </div>
        </section>

        <section class="rounded-lg border border-slate-300 bg-white p-5">
          <h2 class="mb-4 text-lg font-bold">처리 진행률</h2>
          <div class="mb-3 h-4 overflow-hidden rounded-full bg-slate-200">
            <div id="progressBar" class="h-full w-0 rounded-full bg-blue-600 transition-all"></div>
          </div>
          <div class="grid gap-3 text-sm sm:grid-cols-2 xl:grid-cols-7">
            <div class="rounded-md bg-slate-50 p-3">
              <div class="font-semibold text-slate-500">진행률</div>
              <div id="progressText" class="mt-1 font-bold">0%</div>
            </div>
            <div class="rounded-md bg-slate-50 p-3">
              <div class="font-semibold text-slate-500">읽은 용량</div>
              <div id="readBytes" class="mt-1 font-bold">0 B</div>
            </div>
            <div class="rounded-md bg-slate-50 p-3">
              <div class="font-semibold text-slate-500">처리 행</div>
              <div id="lineCount" class="mt-1 font-bold">0</div>
            </div>
            <div class="rounded-md bg-slate-50 p-3">
              <div class="font-semibold text-slate-500">정상</div>
              <div id="validCount" class="mt-1 font-bold">0</div>
            </div>
            <div class="rounded-md bg-slate-50 p-3">
              <div class="font-semibold text-slate-500">불가</div>
              <div id="invalidCount" class="mt-1 font-bold">0</div>
            </div>
            <div class="rounded-md bg-slate-50 p-3">
              <div class="font-semibold text-slate-500">출력 용량</div>
              <div id="outputBytes" class="mt-1 font-bold">0 B</div>
            </div>
            <div class="rounded-md bg-slate-50 p-3">
              <div class="font-semibold text-slate-500">출력 파일</div>
              <div id="outputFiles" class="mt-1 font-bold">0</div>
            </div>
          </div>
          <div id="message" class="mt-4 min-h-6 text-sm text-slate-600"></div>
        </section>
      </div>

      <aside class="space-y-5">
        <section class="rounded-lg border border-slate-300 bg-white p-5">
          <h2 class="mb-4 text-lg font-bold">제약 조건</h2>
          <div class="space-y-4">
            <label class="block">
              <span class="mb-1 block text-sm font-bold text-slate-700">청크 크기</span>
              <input id="chunkSize" type="text" value="10 MB" readonly class="w-full rounded-md border border-slate-300 bg-slate-100 px-3 py-2 text-sm text-slate-600">
            </label>
            <label class="block">
              <span class="mb-1 block text-sm font-bold text-slate-700">최대 처리 용량(MB)</span>
              <input id="maxMegabytes" type="number" min="0" step="1" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm outline-none focus:border-blue-500" placeholder="비우면 전체">
            </label>
            <label class="block">
              <span class="mb-1 block text-sm font-bold text-slate-700">최대 처리 행 수</span>
              <input id="maxLines" type="number" min="0" step="1" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm outline-none focus:border-blue-500" placeholder="비우면 제한 없음">
            </label>
            <label class="block">
              <span class="mb-1 block text-sm font-bold text-slate-700">분할 행 수(Line Count)</span>
              <input id="splitLineCount" type="number" min="1" step="1" class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm outline-none focus:border-blue-500" placeholder="예: 100000, 비우면 단일 파일">
            </label>
            <label class="flex items-center gap-2 text-sm font-semibold text-slate-700">
              <input id="skipEmpty" type="checkbox">
              빈 행 제외
            </label>
          </div>
        </section>

        <section class="rounded-lg border border-slate-300 bg-white p-5">
          <h2 class="mb-4 text-lg font-bold">실행</h2>
          <div class="grid gap-3">
            <button id="startBtn" type="button" disabled class="rounded-md bg-blue-600 px-4 py-2 font-bold text-white disabled:cursor-not-allowed disabled:bg-slate-300">처리 시작</button>
            <button id="cancelBtn" type="button" disabled class="rounded-md bg-slate-700 px-4 py-2 font-bold text-white disabled:cursor-not-allowed disabled:bg-slate-300">중단</button>
            <button id="downloadBtn" type="button" disabled class="rounded-md bg-emerald-600 px-4 py-2 font-bold text-white disabled:cursor-not-allowed disabled:bg-slate-300">결과 다운로드</button>
          </div>
        </section>

        <section class="rounded-lg border border-slate-300 bg-white p-5">
          <h2 class="mb-4 text-lg font-bold">정상 매핑 미리보기</h2>
          <pre id="preview" class="h-72 overflow-auto rounded-md bg-slate-950 p-3 text-xs leading-5 text-slate-100"></pre>
        </section>

        <section class="rounded-lg border border-slate-300 bg-white p-5">
          <h2 class="mb-4 text-lg font-bold">불가 목록 미리보기</h2>
          <pre id="invalidPreview" class="h-72 overflow-auto rounded-md bg-slate-950 p-3 text-xs leading-5 text-red-100"></pre>
        </section>
      </aside>
    </section>
  </main>

  <script>
(function () {
  "use strict";

  var CHUNK_SIZE_BYTES = 10 * 1024 * 1024;
  var PREVIEW_LIMIT = 32 * 1024;
  var OUTPUT_FLUSH_CHARS = 512 * 1024;
  var DOWNLOAD_DELAY_MS = 250;
  var URL_REVOKE_DELAY_MS = 1000;
  var TEXT_MIME_TYPE = "text/plain;charset=utf-8";
  var CSV_MIME_TYPE = "text/csv;charset=utf-8";
  var CSV_HEADER = "\uFEFFOriginal_NFS_Path,Target_Object_Storage_Key,Status,Error_Reason\n";
  var ELEMENT_IDS = [
    "fileInput", "dropZone", "fileStatus", "metaName", "metaSize", "metaDate",
    "nfsPrefix", "objectPrefix", "regexPattern", "replacement", "flagIgnoreCase", "flagMultiline",
    "includePattern", "excludePattern", "maxMegabytes", "maxLines", "splitLineCount", "skipEmpty",
    "progressBar", "progressText", "readBytes", "lineCount", "validCount", "invalidCount",
    "outputBytes", "outputFiles", "message", "startBtn", "cancelBtn", "downloadBtn",
    "preview", "invalidPreview"
  ];
  var DROP_ACTIVE_CLASSES = ["border-blue-500", "bg-blue-50"];
  var OUTPUT_ORDER = ["report", "errorList", "mapped"];

  var selectedFile = null;
  var resultFiles = [];
  var cancelRequested = false;
  var isProcessing = false;

  var elements = {};

  document.addEventListener("DOMContentLoaded", function () {
    bindElements();
    bindEvents();
    resetProgress();
  });

  function bindElements() {
    ELEMENT_IDS.forEach(function (id) {
      elements[id] = document.getElementById(id);
    });
  }

  function bindEvents() {
    elements.fileInput.addEventListener("change", function (event) {
      setFile(event.target.files && event.target.files[0]);
    });

    ["dragenter", "dragover"].forEach(function (name) {
      elements.dropZone.addEventListener(name, function (event) {
        event.preventDefault();
        setDropZoneActive(true);
      });
    });

    ["dragleave", "drop"].forEach(function (name) {
      elements.dropZone.addEventListener(name, function (event) {
        event.preventDefault();
        setDropZoneActive(false);
      });
    });

    elements.dropZone.addEventListener("drop", function (event) {
      setFile(event.dataTransfer && event.dataTransfer.files && event.dataTransfer.files[0]);
    });

    elements.startBtn.addEventListener("click", startProcessing);
    elements.cancelBtn.addEventListener("click", function () {
      cancelRequested = true;
      setMessage("처리 중단 요청됨. 현재 청크 처리 후 멈춥니다.");
    });
    elements.downloadBtn.addEventListener("click", downloadResult);
  }

  function setDropZoneActive(isActive) {
    var action = isActive ? "add" : "remove";
    elements.dropZone.classList[action](DROP_ACTIVE_CLASSES[0], DROP_ACTIVE_CLASSES[1]);
  }

  function setFile(file) {
    selectedFile = file || null;
    releaseResultFiles();
    elements.downloadBtn.disabled = true;
    resetProgress();

    if (!selectedFile) {
      elements.fileStatus.textContent = "파일 없음";
      elements.metaName.textContent = "-";
      elements.metaSize.textContent = "-";
      elements.metaDate.textContent = "-";
      elements.startBtn.disabled = true;
      return;
    }

    elements.fileStatus.textContent = "파일 선택됨";
    elements.metaName.textContent = selectedFile.name;
    elements.metaSize.textContent = formatBytes(selectedFile.size);
    elements.metaDate.textContent = selectedFile.lastModified ? formatDate(selectedFile.lastModified) : "-";
    elements.startBtn.disabled = false;
    setMessage("파일을 선택했습니다. NFS/Object Storage 접두사와 제약 조건을 확인한 뒤 처리를 시작하세요.");
  }

  async function startProcessing() {
    if (!selectedFile || isProcessing) return;

    var config;
    try {
      config = buildConfig();
    } catch (error) {
      setMessage(error.message, true);
      return;
    }

    isProcessing = true;
    cancelRequested = false;
    releaseResultFiles();
    setProcessingControls(true);
    resetProgress();
    setMessage("10MB 청크 단위로 읽고, Mapping Report CSV와 Error List TXT를 생성합니다.");

    try {
      var result = await processFile(selectedFile, config);
      resultFiles = result.files;

      if (resultFiles.length) {
        elements.downloadBtn.disabled = false;
        setMessage("처리가 완료되었습니다. 정상 " + result.stats.validLines + "건, 불가 " + result.stats.invalidLines + "건, 출력 " + resultFiles.length + "개 파일을 준비했습니다.");
      } else {
        setMessage("출력할 행이 없습니다. 포함/제외 조건을 확인하세요.", true);
      }
    } catch (error) {
      releaseResultFiles();
      if (error && error.code === "CANCELLED") {
        setMessage("처리가 중단되었습니다.");
      } else {
        setMessage((error && error.message) || "처리 중 오류가 발생했습니다.", true);
      }
    } finally {
      isProcessing = false;
      setProcessingControls(false);
    }
  }

  function setProcessingControls(processing) {
    elements.startBtn.disabled = processing || !selectedFile;
    elements.cancelBtn.disabled = !processing;
    elements.downloadBtn.disabled = processing || !resultFiles.length;
  }

  function buildConfig() {
    var flags = "g";
    var nfsPrefix = elements.nfsPrefix.value.trim();
    var objectPrefix = elements.objectPrefix.value.trim();

    if ((nfsPrefix && !objectPrefix) || (!nfsPrefix && objectPrefix)) {
      throw new Error("원본 경로 접두사와 To-Be 경로 접두사는 함께 입력하세요.");
    }

    if (elements.flagIgnoreCase.checked) flags += "i";
    if (elements.flagMultiline.checked) flags += "m";

    return {
      nfsPrefix: nfsPrefix,
      objectPrefix: objectPrefix,
      usePrefixMapping: !!(nfsPrefix && objectPrefix),
      mappingRegex: compileOptionalRegex(elements.regexPattern.value, flags, "추가 Regex"),
      replacement: elements.replacement.value,
      includeRegex: compileOptionalRegex(elements.includePattern.value, flags.replace("g", ""), "포함 Regex"),
      excludeRegex: compileOptionalRegex(elements.excludePattern.value, flags.replace("g", ""), "제외 Regex"),
      skipEmpty: elements.skipEmpty.checked,
      maxBytes: parseOptionalLimit(elements.maxMegabytes.value, 1024 * 1024),
      maxLines: parseOptionalLimit(elements.maxLines.value, 1),
      splitLineCount: parseOptionalPositiveInteger(elements.splitLineCount.value, "분할 행 수")
    };
  }

  function compileOptionalRegex(value, flags, label) {
    var pattern = String(value || "").trim();
    return pattern ? compileRegex(pattern, flags, label) : null;
  }

  function compileRegex(pattern, flags, label) {
    try {
      return new RegExp(pattern, flags);
    } catch (error) {
      throw new Error(label + "가 올바르지 않습니다: " + error.message);
    }
  }

  function parseOptionalLimit(value, unit) {
    if (!String(value || "").trim()) return 0;
    var parsed = Number(value);
    if (!isFinite(parsed) || parsed < 0) return 0;
    return Math.floor(parsed * unit);
  }

  function parseOptionalPositiveInteger(value, label) {
    if (!String(value || "").trim()) return 0;
    var parsed = Number(value);
    if (!isFinite(parsed) || parsed < 1) {
      throw new Error(label + "는 1 이상의 숫자로 입력하세요.");
    }
    return Math.floor(parsed);
  }

  async function processFile(file, config) {
    var decoder = new TextDecoder("utf-8");
    var encoder = new TextEncoder();
    var outputs = createOutputStates(file.name, config);
    var offset = 0;
    var totalBytes = config.maxBytes ? Math.min(file.size, config.maxBytes) : file.size;
    var tail = "";
    var stats = {
      readBytes: 0,
      readLines: 0,
      validLines: 0,
      invalidLines: 0,
      outputBytes: 0,
      fileCount: 0,
      previewText: "",
      invalidPreviewText: ""
    };

    while (offset < totalBytes) {
      if (cancelRequested) throwCancelled();

      var end = Math.min(offset + CHUNK_SIZE_BYTES, totalBytes);
      var sourceBlob = file.slice(offset, end);
      var buffer = await sourceBlob.arrayBuffer();
      var text = decoder.decode(buffer, { stream: end < totalBytes });
      var split = splitDecodedText(tail + text);

      tail = split.tail;
      writeMappedLines(split.lines, config, encoder, outputs, stats);
      offset = end;
      stats.readBytes = offset;
      updateProgress(stats, totalBytes);

      sourceBlob = null;
      buffer = null;
      text = null;
      split = null;

      if (config.maxLines && stats.readLines >= config.maxLines) break;
      await nextFrame();
    }

    var rest = decoder.decode();
    if (rest) tail += rest;
    if (tail && (!config.maxLines || stats.readLines < config.maxLines)) {
      writeMappedLines([tail], config, encoder, outputs, stats);
    }

    finalizeOutputs(outputs, encoder, stats);
    updateProgress(stats, totalBytes || stats.readBytes || 1);
    return { files: collectResultFiles(outputs), stats: stats };
  }

  function splitDecodedText(text) {
    var lines = text.split("\n");
    var tail = lines.pop();
    return { lines: lines, tail: tail };
  }

  function writeMappedLines(lines, config, encoder, outputs, stats) {
    for (var i = 0; i < lines.length; i += 1) {
      if (config.maxLines && stats.readLines >= config.maxLines) return;

      var original = stripCarriageReturn(lines[i]);
      stats.readLines += 1;

      if (shouldSkipLine(original, config)) continue;

      var result = mapAndValidateLine(original, config);
      appendProcessedResult(result, encoder, outputs, stats);

      if (outputs.mapped.splitLineCount && outputs.mapped.currentLineCount >= outputs.mapped.splitLineCount) {
        finalizeCurrentSplit(outputs.mapped, encoder, stats);
      }
    }
  }

  function shouldSkipLine(line, config) {
    if (config.skipEmpty && !line.trim()) return true;
    if (config.includeRegex && !testLine(config.includeRegex, line)) return true;
    return !!(config.excludeRegex && testLine(config.excludeRegex, line));
  }

  function appendProcessedResult(result, encoder, outputs, stats) {
    appendReportLine(result, encoder, outputs.report, stats);

    if (result.reason) {
      appendErrorListLine(result.original, encoder, outputs.errorList, stats);
      appendInvalidPreview(result.original, result.reason, stats);
      stats.invalidLines += 1;
      return;
    }

    appendOutputLine(result.mapped, encoder, outputs.mapped, stats);
    stats.validLines += 1;
  }

  function stripCarriageReturn(line) {
    if (line && line.charAt(line.length - 1) === "\r") {
      return line.slice(0, -1);
    }
    return line;
  }

  function mapAndValidateLine(original, config) {
    var mapped = original;
    var reason = "";

    if (config.usePrefixMapping) {
      if (original.indexOf(config.nfsPrefix) !== 0) {
        reason = addReason(reason, "원본 경로 접두사 불일치");
      } else {
        mapped = replacePrefix(original, config.nfsPrefix, config.objectPrefix);
      }
    }

    if (config.mappingRegex) {
      config.mappingRegex.lastIndex = 0;
      mapped = mapped.replace(config.mappingRegex, config.replacement);
    }

    reason = addReason(reason, validateObjectPath(mapped));
    return {
      original: original,
      mapped: mapped,
      status: reason ? "Fail" : "Success",
      reason: reason
    };
  }

  function replacePrefix(value, fromPrefix, toPrefix) {
    var rest = value.slice(fromPrefix.length);
    if (toPrefix && rest && toPrefix.charAt(toPrefix.length - 1) === "/" && rest.charAt(0) === "/") {
      rest = rest.slice(1);
    } else if (toPrefix && rest && toPrefix.charAt(toPrefix.length - 1) !== "/" && rest.charAt(0) !== "/") {
      rest = "/" + rest;
    }
    return toPrefix + rest;
  }

  function validateObjectPath(path) {
    var reason = "";

    if (!path) {
      reason = addReason(reason, "경로 비어 있음");
    }
    if (/[\\*?"<>|#%]/.test(path)) {
      reason = addReason(reason, "금지 특수문자 포함(\\, *, ?, \", <, >, |, #, %)");
    }
    if (path.length > 1024) {
      reason = addReason(reason, "전체 경로 길이 1,024자 초과");
    }
    if (/[\s\u0000-\u001F\u007F]/.test(path)) {
      reason = addReason(reason, "공백 또는 제어 문자 포함");
    }

    return reason;
  }

  function addReason(current, reason) {
    if (!reason) return current || "";
    if (!current) return reason;
    return current + "; " + reason;
  }

  function testLine(regex, line) {
    regex.lastIndex = 0;
    return regex.test(line);
  }

  function createOutputStates(fileName, config) {
    return {
      mapped: createOutputState(fileName, "mapped", TEXT_MIME_TYPE, "", config.splitLineCount),
      report: createOutputState(fileName, "report", CSV_MIME_TYPE, CSV_HEADER, 0),
      errorList: createOutputState(fileName, "errorList", TEXT_MIME_TYPE, "", 0)
    };
  }

  function createOutputState(fileName, kind, mimeType, header, splitLineCount) {
    return {
      kind: kind,
      sourceName: fileName || "result.log",
      mimeType: mimeType,
      header: header || "",
      splitLineCount: splitLineCount || 0,
      files: [],
      currentBlob: null,
      currentText: "",
      currentLineCount: 0,
      currentBytes: 0,
      splitIndex: 0
    };
  }

  function appendReportLine(result, encoder, output, stats) {
    appendOutputLine([
      csvCell(result.original),
      csvCell(result.mapped),
      csvCell(result.status),
      csvCell(result.reason)
    ].join(","), encoder, output, stats);
  }

  function csvCell(value) {
    return "\"" + String(value == null ? "" : value).replace(/"/g, "\"\"") + "\"";
  }

  function appendErrorListLine(original, encoder, output, stats) {
    appendOutputLine(original, encoder, output, stats);
  }

  function appendOutputLine(line, encoder, output, stats) {
    var text;

    ensureOutputHeader(output);
    text = line + "\n";
    output.currentText += text;
    output.currentLineCount += 1;

    if (output.kind === "mapped") {
      appendMappedPreview(text, stats);
    }

    if (output.currentText.length >= OUTPUT_FLUSH_CHARS) {
      flushCurrentText(output, encoder, stats);
    }
  }

  function ensureOutputHeader(output) {
    if (output.header && !output.currentLineCount && !output.currentText && !output.currentBlob) {
      output.currentText = output.header;
    }
  }

  function appendMappedPreview(text, stats) {
    if (stats.previewText.length < PREVIEW_LIMIT) {
      stats.previewText += text.slice(0, PREVIEW_LIMIT - stats.previewText.length);
      elements.preview.textContent = stats.previewText;
    }
  }

  function appendInvalidPreview(original, reason, stats) {
    var text = original + "\t" + reason + "\n";
    if (stats.invalidPreviewText.length < PREVIEW_LIMIT) {
      stats.invalidPreviewText += text.slice(0, PREVIEW_LIMIT - stats.invalidPreviewText.length);
      elements.invalidPreview.textContent = stats.invalidPreviewText;
    }
  }

  function flushCurrentText(output, encoder, stats) {
    if (!output.currentText) return;

    var bytes = encoder.encode(output.currentText);
    output.currentBlob = output.currentBlob ?
      new Blob([output.currentBlob, bytes], { type: output.mimeType }) :
      new Blob([bytes], { type: output.mimeType });
    output.currentBytes += bytes.byteLength;
    stats.outputBytes += bytes.byteLength;
    output.currentText = "";
    bytes = null;
  }

  function finalizeCurrentSplit(output, encoder, stats) {
    flushCurrentText(output, encoder, stats);
    if (!output.currentBlob || !output.currentLineCount) return;

    output.splitIndex += 1;
    output.files[output.files.length] = {
      name: makeOutputFileName(output, output.splitIndex),
      blob: output.currentBlob,
      bytes: output.currentBytes,
      kind: output.kind
    };
    stats.fileCount += 1;

    output.currentBlob = null;
    output.currentText = "";
    output.currentLineCount = 0;
    output.currentBytes = 0;
  }

  function finalizeOutputs(outputs, encoder, stats) {
    OUTPUT_ORDER.forEach(function (key) {
      finalizeCurrentSplit(outputs[key], encoder, stats);
    });
  }

  function collectResultFiles(outputs) {
    var files = [];
    OUTPUT_ORDER.forEach(function (key) {
      appendFiles(files, outputs[key].files);
    });
    return files;
  }

  function appendFiles(target, source) {
    for (var i = 0; i < source.length; i += 1) {
      target[target.length] = source[i];
    }
  }

  function updateProgress(stats, totalBytes) {
    var percent = totalBytes ? Math.min(100, Math.round((stats.readBytes / totalBytes) * 100)) : 0;
    elements.progressBar.style.width = percent + "%";
    elements.progressText.textContent = percent + "%";
    elements.readBytes.textContent = formatBytes(stats.readBytes);
    elements.lineCount.textContent = String(stats.readLines);
    elements.validCount.textContent = String(stats.validLines);
    elements.invalidCount.textContent = String(stats.invalidLines);
    elements.outputBytes.textContent = formatBytes(stats.outputBytes);
    elements.outputFiles.textContent = String(stats.fileCount);
  }

  function resetProgress() {
    elements.progressBar && (elements.progressBar.style.width = "0%");
    elements.progressText && (elements.progressText.textContent = "0%");
    elements.readBytes && (elements.readBytes.textContent = "0 B");
    elements.lineCount && (elements.lineCount.textContent = "0");
    elements.validCount && (elements.validCount.textContent = "0");
    elements.invalidCount && (elements.invalidCount.textContent = "0");
    elements.outputBytes && (elements.outputBytes.textContent = "0 B");
    elements.outputFiles && (elements.outputFiles.textContent = "0");
    elements.preview && (elements.preview.textContent = "");
    elements.invalidPreview && (elements.invalidPreview.textContent = "");
    elements.message && (elements.message.textContent = "");
  }

  async function downloadResult() {
    if (!resultFiles.length) return;

    elements.downloadBtn.disabled = true;
    setMessage(resultFiles.length + "개 결과 파일 다운로드를 요청합니다.");

    for (var i = 0; i < resultFiles.length; i += 1) {
      triggerDownload(resultFiles[i].blob, resultFiles[i].name);
      resultFiles[i].blob = null;
      await delay(DOWNLOAD_DELAY_MS);
    }

    releaseResultFiles();
    elements.downloadBtn.disabled = true;
    setMessage("다운로드 요청을 완료하고 결과 Blob 참조를 해제했습니다. 다시 내려받으려면 재처리하세요.");
  }

  function triggerDownload(blob, fileName) {
    var url = URL.createObjectURL(blob);
    var anchor = document.createElement("a");
    anchor.href = url;
    anchor.download = fileName || "mapping-report.csv";
    document.body.appendChild(anchor);
    anchor.click();
    anchor.remove();
    setTimeout(function () {
      URL.revokeObjectURL(url);
    }, URL_REVOKE_DELAY_MS);
  }

  function releaseResultFiles() {
    for (var i = 0; i < resultFiles.length; i += 1) {
      resultFiles[i].blob = null;
    }
    resultFiles = [];
  }

  function makeOutputFileName(output, index) {
    var parsed = splitFileName(output.sourceName || "result.log");

    if (output.kind === "report") {
      return parsed.base + ".mapping-report.csv";
    }
    if (output.kind === "errorList") {
      return parsed.base + ".error-list.txt";
    }

    var suffix = ".mapped";
    if (output.splitLineCount) {
      suffix += ".part" + padNumber(index, 4);
    }
    return parsed.base + suffix + parsed.ext;
  }

  function splitFileName(name) {
    var dot = name.lastIndexOf(".");
    if (dot <= 0) return { base: name, ext: ".log" };
    return { base: name.slice(0, dot), ext: name.slice(dot) };
  }

  function padNumber(value, size) {
    var text = String(value);
    while (text.length < size) text = "0" + text;
    return text;
  }

  function setMessage(message, isError) {
    elements.message.textContent = message || "";
    elements.message.className = "mt-4 min-h-6 text-sm " + (isError ? "text-red-600" : "text-slate-600");
  }

  function throwCancelled() {
    var error = new Error("cancelled");
    error.code = "CANCELLED";
    throw error;
  }

  function nextFrame() {
    return new Promise(function (resolve) {
      requestAnimationFrame(function () { resolve(); });
    });
  }

  function delay(ms) {
    return new Promise(function (resolve) {
      setTimeout(function () { resolve(); }, ms);
    });
  }

  function formatBytes(bytes) {
    if (!bytes) return "0 B";
    var units = ["B", "KB", "MB", "GB", "TB"];
    var value = bytes;
    var unit = 0;
    while (value >= 1024 && unit < units.length - 1) {
      value /= 1024;
      unit += 1;
    }
    return (unit === 0 ? value : value.toFixed(2)) + " " + units[unit];
  }

  function formatDate(timestamp) {
    var date = new Date(timestamp);
    var month = String(date.getMonth() + 1).padStart(2, "0");
    var day = String(date.getDate()).padStart(2, "0");
    return date.getFullYear() + "-" + month + "-" + day;
  }
})();
  </script>
</body>
</html>
