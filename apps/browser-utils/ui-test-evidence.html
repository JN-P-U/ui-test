<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UI 테스트 증빙 엑셀 생성기</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #111827;
      background: #f6f7f9;
    }
    main {
      max-width: 1040px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }
    h1 {
      margin: 0 0 24px;
      font-size: 24px;
      letter-spacing: 0;
    }
    section {
      margin-bottom: 20px;
      padding: 20px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: #fff;
    }
    h2 {
      margin: 0 0 16px;
      font-size: 16px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }
    .grid.five {
      grid-template-columns: repeat(5, minmax(0, 1fr));
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 700;
      color: #374151;
    }
    input,
    textarea {
      box-sizing: border-box;
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      padding: 9px 10px;
      font: inherit;
      font-size: 14px;
      background: #fff;
    }
    textarea {
      resize: vertical;
      min-height: 70px;
    }
    .case {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 16px;
      padding-top: 16px;
      border-top: 1px solid #e5e7eb;
    }
    .case:first-of-type {
      border-top: 0;
      padding-top: 0;
    }
    .thumbPreview {
      display: block;
      width: 180px;
      height: 120px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 0;
      overflow: hidden;
      background: #f9fafb;
      cursor: zoom-in;
    }
    .thumb {
      width: 180px;
      height: 120px;
      object-fit: contain;
    }
    .thumbPanel {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .thumbAction {
      box-sizing: border-box;
      width: 100%;
      border: 0;
      border-radius: 6px;
      padding: 9px 10px;
      text-align: center;
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      background: #1d4ed8;
    }
    .thumbAction.secondaryAction {
      color: #111827;
      background: #e5e7eb;
    }
    .thumbAction:disabled {
      cursor: wait;
      opacity: 0.65;
    }
    .captureStatus {
      min-height: 18px;
      margin: -4px 0 14px;
      font-size: 13px;
      color: #4b5563;
    }
    .actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 20px;
    }
    button {
      border: 0;
      border-radius: 6px;
      padding: 10px 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      background: #1d4ed8;
    }
    button.secondary {
      color: #111827;
      background: #e5e7eb;
    }
    .file {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
      color: #4b5563;
    }
    .previewOverlay {
      position: fixed;
      inset: 0;
      z-index: 10000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(17, 24, 39, 0.72);
    }
    .previewOverlay.isOpen {
      display: flex;
    }
    .previewModal {
      width: min(1120px, 100%);
      max-height: calc(100vh - 48px);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.35);
    }
    .previewHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 16px;
      border-bottom: 1px solid #e5e7eb;
    }
    .previewTitle {
      margin: 0;
      font-size: 15px;
      letter-spacing: 0;
    }
    .previewClose {
      color: #111827;
      background: #e5e7eb;
    }
    .previewBody {
      max-height: calc(100vh - 120px);
      overflow: auto;
      background: #f9fafb;
    }
    .previewImage {
      display: block;
      width: 100%;
      height: auto;
      min-height: 240px;
      object-fit: contain;
      background: #fff;
    }
    @media (max-width: 820px) {
      .grid,
      .grid.five,
      .case {
        grid-template-columns: 1fr;
      }
      .thumbPreview,
      .thumb {
        width: 100%;
      }
      .actions {
        align-items: stretch;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>UI 테스트 증빙 엑셀 생성기</h1>

    <section>
      <h2>파일 정보</h2>
      <div class="grid">
        <div>
          <label for="serviceCode">서비스코드</label>
          <input id="serviceCode" value="CHC">
        </div>
        <div>
          <label for="screenId">화면ID</label>
          <input id="screenId" value="UserRegister">
        </div>
        <div>
          <label for="screenName">화면명</label>
          <input id="screenName" value="사용자 등록">
        </div>
        <div>
          <label for="author">작성자</label>
          <input id="author" value="">
        </div>
      </div>
      <div class="grid five" style="margin-top:12px">
        <div>
          <label for="bizCategory">업무분류</label>
          <input id="bizCategory">
        </div>
        <div>
          <label for="level1">Level1</label>
          <input id="level1">
        </div>
        <div>
          <label for="level2">Level2</label>
          <input id="level2">
        </div>
        <div>
          <label for="level3">Level3</label>
          <input id="level3">
        </div>
        <div>
          <label for="level4">Level4</label>
          <input id="level4">
        </div>
      </div>
    </section>

    <section>
      <h2>테스트 케이스</h2>
      <div class="captureStatus" id="captureStatus" role="status" aria-live="polite"></div>
      <div id="cases"></div>
      <div class="actions">
        <button type="button" class="secondary" id="addCase">케이스 추가</button>
        <div class="file" id="fileName"></div>
        <button type="button" id="download">엑셀 다운로드</button>
      </div>
    </section>
  </main>

  <div class="previewOverlay" id="previewOverlay" aria-hidden="true">
    <div class="previewModal" role="dialog" aria-modal="true" aria-labelledby="previewTitle">
      <div class="previewHeader">
        <h2 class="previewTitle" id="previewTitle">캡처 미리보기</h2>
        <button type="button" class="previewClose" id="previewClose">닫기</button>
      </div>
      <div class="previewBody">
        <img class="previewImage" id="previewImage" alt="캡처 미리보기">
      </div>
    </div>
  </div>

  <script src="./ui-test-evidence-excel.js"></script>
  <script>
    var onePixelPng = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAFgwJ/l3m9kgAAAABJRU5ErkJggg==";
    var cases = [{
      caseNumber: 1,
      imageBase64: onePixelPng,
      testItem: "사용자 등록",
      testContent: "필수값 입력 후 저장 버튼 클릭",
      expectedResult: "사용자가 정상 등록되고 성공 메시지가 표시된다.",
      programId: "UserRegister",
      verifyMethod: "탭 화면 캡처"
    }];

    function value(id) {
      return document.getElementById(id).value;
    }

    function escapeHtml(value) {
      return String(value == null ? "" : value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function body() {
      return {
        serviceCode: value("serviceCode"),
        screenId: value("screenId"),
        screenName: value("screenName"),
        author: value("author"),
        bizCategory: value("bizCategory"),
        level1: value("level1"),
        level2: value("level2"),
        level3: value("level3"),
        level4: value("level4"),
        cases: cases
      };
    }

    function updateFileName() {
      document.getElementById("fileName").textContent = UITestEvidenceExcel.makeFileName(body());
    }

    function render() {
      updateFileName();
      document.getElementById("cases").innerHTML = cases.map(function (c, i) {
        return '<div class="case">' +
          '<div class="thumbPanel">' +
          '<button type="button" class="thumbPreview" data-action="preview" data-i="' + i + '" aria-label="케이스 ' + escapeHtml(c.caseNumber) + '번 캡처 미리보기">' +
          '<img class="thumb" src="' + escapeHtml(c.imageBase64) + '" alt="케이스 ' + escapeHtml(c.caseNumber) + ' 증빙">' +
          '</button>' +
          '<button type="button" class="thumbAction" data-action="capture" data-i="' + i + '">탭 화면 캡처</button>' +
          '<button type="button" class="thumbAction secondaryAction" data-action="preview" data-i="' + i + '">미리보기</button>' +
          '</div>' +
          '<div class="grid">' +
          '<div><label>케이스번호</label><input data-i="' + i + '" data-k="caseNumber" type="number" value="' + escapeHtml(c.caseNumber) + '"></div>' +
          '<div><label>테스트항목</label><input data-i="' + i + '" data-k="testItem" value="' + escapeHtml(c.testItem) + '"></div>' +
          '<div><label>프로그램ID</label><input data-i="' + i + '" data-k="programId" value="' + escapeHtml(c.programId) + '"></div>' +
          '<div><label>결과확인방법</label><input data-i="' + i + '" data-k="verifyMethod" value="' + escapeHtml(c.verifyMethod) + '"></div>' +
          '<div style="grid-column:1/-1"><label>테스트내용</label><textarea data-i="' + i + '" data-k="testContent">' + escapeHtml(c.testContent) + '</textarea></div>' +
          '<div style="grid-column:1/-1"><label>예상결과</label><textarea data-i="' + i + '" data-k="expectedResult">' + escapeHtml(c.expectedResult) + '</textarea></div>' +
          '</div></div>';
      }).join("");
    }

    function setCaptureStatus(message) {
      document.getElementById("captureStatus").textContent = message || "";
    }

    function openPreview(index) {
      var testCase = cases[index];
      if (!testCase) return;
      var overlay = document.getElementById("previewOverlay");
      document.getElementById("previewTitle").textContent = "케이스 " + testCase.caseNumber + "번 캡처 미리보기";
      document.getElementById("previewImage").src = testCase.imageBase64;
      overlay.classList.add("isOpen");
      overlay.setAttribute("aria-hidden", "false");
      document.getElementById("previewClose").focus();
    }

    function closePreview() {
      var overlay = document.getElementById("previewOverlay");
      overlay.classList.remove("isOpen");
      overlay.setAttribute("aria-hidden", "true");
      document.getElementById("previewImage").removeAttribute("src");
    }

    document.addEventListener("input", function (e) {
      if (!e.target.dataset.k) {
        updateFileName();
        return;
      }
      var c = cases[Number(e.target.dataset.i)];
      c[e.target.dataset.k] = e.target.dataset.k === "caseNumber" ? Number(e.target.value || 1) : e.target.value;
    });

    document.addEventListener("click", function (e) {
      var previewButton = e.target.closest && e.target.closest("[data-action='preview']");
      if (previewButton) {
        openPreview(Number(previewButton.dataset.i));
        return;
      }

      var button = e.target.closest && e.target.closest("[data-action='capture']");
      if (!button) return;

      var i = Number(button.dataset.i);
      button.disabled = true;
      button.textContent = "캡처 중...";
      setCaptureStatus("브라우저에서 캡처할 탭을 선택하세요.");

      UITestEvidenceExcel.captureTab({ maxWidth: 1600 }).then(function (image) {
        cases[i].imageBase64 = image;
        setCaptureStatus("케이스 " + cases[i].caseNumber + "번 탭 화면 캡처를 반영했습니다.");
        render();
      }).catch(function (error) {
        var cancelled = error && (error.name === "NotAllowedError" || error.name === "AbortError");
        setCaptureStatus(cancelled ? "탭 화면 캡처가 취소되었습니다." : (error && error.message) || "탭 화면 캡처 중 오류가 발생했습니다.");
        button.disabled = false;
        button.textContent = "탭 화면 캡처";
      });
    });

    document.getElementById("addCase").addEventListener("click", function () {
      cases.push({
        caseNumber: cases.length + 1,
        imageBase64: onePixelPng,
        testItem: "",
        testContent: "",
        expectedResult: "",
        programId: value("screenId"),
        verifyMethod: "탭 화면 캡처"
      });
      render();
    });

    document.getElementById("download").addEventListener("click", function () {
      UITestEvidenceExcel.downloadExcel(body());
    });

    document.getElementById("previewClose").addEventListener("click", closePreview);
    document.getElementById("previewOverlay").addEventListener("click", function (e) {
      if (e.target.id === "previewOverlay") closePreview();
    });
    document.addEventListener("keydown", function (e) {
      if (e.key === "Escape") closePreview();
    });

    render();
  </script>
</body>
</html>
